<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя Тапалка</title>
    <style>
        /* --- ДИЗАЙН --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Arial', sans-serif;
            user-select: none;
            overflow: hidden;
            position: relative;
            
            /* Настройки для плавного переключения фонов уровней */
            background-color: #1a1a2e; 
            background-size: cover;    
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease, background-color 0.8s ease; 
        }

        /* Кнопка сброса счета */
        #resetBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: background-color 0.2s, transform 0.1s;
        }

        #resetBtn:hover { background-color: #ff6b81; }
        #resetBtn:active { transform: scale(0.95); }

        /* Надпись текущего уровня */
        #levelDisplay {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .score-container {
            font-size: 50px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        /* Твоя монета */
        #coin {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.05s ease;
            -webkit-user-drag: none;
            z-index: 50;
            background-color: #333;
        }

        #coin:active {
            transform: scale(0.92);
        }

        /* --- АНИМАЦИИ --- */

        .floating-text {
            position: absolute;
            color: #4cd137;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .falling-emoji {
            position: absolute;
            top: -50px;
            font-size: 40px;
            pointer-events: none;
            z-index: 60;
            animation: fallDown 2s linear forwards;
        }

        @keyframes fallDown {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        .maxim-text {
            position: absolute;
            color: #ff4757;
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            animation: popOut 1.5s ease-out forwards;
            text-align: center;
        }

        @keyframes popOut {
            0% { transform: scale(0.2) translateY(0); opacity: 0; }
            20% { transform: scale(1.2) translateY(-20px); opacity: 1; }
            80% { transform: scale(1) translateY(-40px); opacity: 1; }
            100% { transform: scale(1.5) translateY(-80px); opacity: 0; }
        }

        .wheelchair {
            position: absolute;
            bottom: 20px;
            font-size: 60px;
            z-index: 80;
            pointer-events: none;
            animation: driveAcross 4s linear infinite; 
        }

        @keyframes driveAcross {
            0% { left: -100px; transform: scaleX(-1); }
            100% { left: 100vw; transform: scaleX(-1); }
        }
    </style>
</head>
<body>

    <!-- МУЗЫКА (Я вписал название файла music.mp3) -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- КНОПКА СБРОСА СЧЕТА -->
    <button id="resetBtn">Удалить счет</button>

    <!-- НАДПИСЬ УРОВНЯ -->
    <div id="levelDisplay">УРОВЕНЬ 1</div>

    <div class="score-container">
        Счет: <span id="score">0</span>
    </div>

    <!-- МОНЕТА -->
    <img id="coin" src="Group1.png" alt="Моя монета" draggable="false">

    <!-- ИНВАЛИДНОЕ КРЕСЛО -->
    <div class="wheelchair">♿</div>

    <script>
        const coin = document.getElementById('coin');
        const scoreElement = document.getElementById('score');
        const bgMusic = document.getElementById('bgMusic');
        const resetBtn = document.getElementById('resetBtn'); 
        const levelDisplay = document.getElementById('levelDisplay');
        
        let isMusicPlaying = false;
        bgMusic.volume = 0.5;

        // Загружаем счет при открытии сайта
        let score = localStorage.getItem('myTapScore') ? parseInt(localStorage.getItem('myTapScore')) : 0;
        scoreElement.textContent = score;

        const emojis = ['🔞', '🍆'];
        let currentLevel = -1; 

        // --- ЛОГИКА УРОВНЕЙ ---
        function checkLevel() {
            let newLevel = 1;

            // Настройки очков для уровней
            if (score >= 150) {
                newLevel = 3;
            } else if (score >= 50) {
                newLevel = 2;
            } else {
                newLevel = 1;
            }

            // Переключаем картинки, если уровень изменился
            if (newLevel !== currentLevel) {
                currentLevel = newLevel;

                if (currentLevel === 1) {
                    levelDisplay.textContent = "УРОВЕНЬ 1"; 
                    coin.src = "Group1.png"; // Файл для 1 уровня
                    document.body.style.backgroundImage = "none";
                    document.body.style.backgroundColor = "#1a1a2e";
                } else if (currentLevel === 2) {
                    levelDisplay.textContent = "УРОВЕНЬ 2"; 
                    coin.src = "maksim2level.png";  // Файл монеты для 2 уровня
                    document.body.style.backgroundImage = "url('bg2.jpg')"; // Файл фона для 2 уровня
                    document.body.style.backgroundColor = "#4a0e2e"; 
                } else if (currentLevel === 3) {
                    levelDisplay.textContent = "УРОВЕНЬ 3"; 
                    coin.src = "maksim2level.png";  // Файл монеты для 3 уровня
                    document.body.style.backgroundImage = "url('bg3.jpg')"; // Файл фона для 3 уровня
                    document.body.style.backgroundColor = "#0e4a1a"; 
                }
            }
        }

        // Проверяем уровень при запуске
        checkLevel();

        // --- ЛОГИКА КЛИКА ПО МОНЕТЕ ---
        coin.addEventListener('pointerdown', function(event) {
            
            // Включаем музыку по первому клику
            if (!isMusicPlaying) {
                bgMusic.play().catch(e => console.log("Браузер пока заблокировал музыку"));
                isMusicPlaying = true;
            }

            // Добавляем счет
            score++;
            scoreElement.textContent = score;
            localStorage.setItem('myTapScore', score);

            // Проверяем, не повысился ли уровень
            checkLevel();

            // Запускаем анимации
            createFloatingPlus(event.clientX, event.clientY);
            createFallingEmoji();
            createMaximText();
        });

        // --- ЛОГИКА КНОПКИ УДАЛЕНИЯ СЧЕТА ---
        resetBtn.addEventListener('click', function() {
            const isConfirmed = confirm("Ты точно хочешь удалить весь счет и начать заново?");
            if (isConfirmed) {
                score = 0; 
                scoreElement.textContent = score; 
                localStorage.setItem('myTapScore', 0); 
                checkLevel(); // Возвращаемся на 1 уровень
            }
        });

        // --- ФУНКЦИИ АНИМАЦИЙ ---
        function createFloatingPlus(x, y) {
            const plusOne = document.createElement('div');
            plusOne.classList.add('floating-text');
            plusOne.textContent = '+1';
            plusOne.style.left = (x - 15) + 'px';
            plusOne.style.top = (y - 20) + 'px';
            document.body.appendChild(plusOne);
            setTimeout(() => plusOne.remove(), 800);
        }

        function createFallingEmoji() {
            const emojiEl = document.createElement('div');
            emojiEl.classList.add('falling-emoji');
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            emojiEl.textContent = randomEmoji;
            emojiEl.style.left = (Math.random() * 90 + 5) + 'vw';
            document.body.appendChild(emojiEl);
            setTimeout(() => emojiEl.remove(), 2000);
        }

        function createMaximText() {
            const maxim = document.createElement('div');
            maxim.classList.add('maxim-text');
            maxim.textContent = 'Максим спит';
            maxim.style.left = (Math.random() * 70 + 15) + 'vw';
            maxim.style.top = (Math.random() * 70 + 15) + 'vh';
            document.body.appendChild(maxim);
            setTimeout(() => maxim.remove(), 1500);
        }
    </script>
</body>
</html>
